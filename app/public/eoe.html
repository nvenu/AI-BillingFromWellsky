<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOE Report - Kinnser Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📋</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #F1F5F9;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #F1F5F9;
    }
    .top-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 2px solid #CBD5E1;
      background: #ffffff;
      flex-shrink: 0;
    }
    .controls-panel {
      padding: 30px;
      background: #ffffff;
      border-right: 1px solid #E2E8F0;
      overflow-y: auto;
      max-height: 50vh;
    }
    .log-panel {
      padding: 30px;
      background: #263238;
      overflow-y: auto;
      max-height: 50vh;
    }
    .charts-panel {
      padding: 30px;
      background: #F1F5F9;
      flex: 1;
    }
    header {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #CBD5E1;
    }
    h1 { 
      font-size: 26px; 
      font-weight: 900; 
      color: #1e293b;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
    }
    .subtitle { 
      font-size: 13px; 
      color: #64748b; 
      font-weight: 600;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 20px;
      background: #ffffff;
      border-radius: 12px;
      border: 2px solid #CBD5E1;
    }
    .control-group { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }
    label { 
      font-size: 11px; 
      font-weight: 800; 
      color: #64748b; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    button {
      padding: 12px 16px;
      border: 2px solid #CBD5E1;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
      color: #1e293b;
    }
    button:hover {
      background: #E2E8F0;
      border-color: #94a3b8;
      transform: translateY(-1px);
    }
    .btn-success {
      background: #10b981;
      color: white;
      border-color: #059669;
    }
    .btn-success:hover {
      background: #059669;
      border-color: #047857;
    }
    .status {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }
    .status-ok {
      background: #d1fae5;
      color: #065f46;
      border: 2px solid #10b981;
    }
    .status-error {
      background: #fee2e2;
      color: #991b1b;
      border: 2px solid #ef4444;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 25px;
    }
    .chart-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 25px;
      border: 2px solid #CBD5E1;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .chart-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      border-color: #94a3b8;
      background: #E2E8F0;
    }
    .chart-card.full-width {
      grid-column: 1 / -1;
    }
    .chart-title {
      font-size: 18px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid #CBD5E1;
      letter-spacing: -0.3px;
    }
    .chart-container { 
      position: relative; 
      height: 400px; 
    }
    .chart-container.tall { 
      height: 500px; 
    }
    .loading, .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
      background: #ffffff;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: 2px dashed #CBD5E1;
    }
    .log-viewer {
      color: #ECEFF1;
      font-family: 'SF Mono', 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .log-viewer h3 {
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #475569;
      letter-spacing: 0.5px;
    }
    .log-entry {
      padding: 10px 14px;
      margin-bottom: 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border-left: 4px solid transparent;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .log-entry:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(4px);
    }
    .log-time { 
      color: #B0BEC5; 
      margin-right: 10px; 
      font-size: 11px;
      font-weight: 700;
    }
    .log-info { 
      color: #4DD0E1;
      border-left-color: #4DD0E1;
    }
    .log-success { 
      color: #81C784;
      border-left-color: #81C784;
    }
    .log-error { 
      color: #E57373;
      border-left-color: #E57373;
      background: rgba(229, 115, 115, 0.1);
    }
    .heatmap-container {
      overflow-x: auto;
    }
    .heatmap-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .heatmap-table th,
    .heatmap-table td {
      padding: 12px;
      text-align: center;
      border: 1px solid #CBD5E1;
    }
    .heatmap-table th {
      background: #475569;
      color: white;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .heatmap-table td {
      font-weight: 600;
      background: #ffffff;
      color: #1e293b;
    }
    .heatmap-table tbody td:first-child {
      text-align: left;
      font-weight: 700;
      color: #1e293b;
      background: #F1F5F9;
    }
    .heatmap-cell-0 { background: #E8F5E9; color: #2E7D32; }
    .heatmap-cell-low { background: #FFF9C4; color: #F57F17; }
    .heatmap-cell-medium { background: #FFE082; color: #E65100; }
    .heatmap-cell-high { background: #FFAB91; color: #BF360C; }
    .heatmap-cell-critical { background: #EF5350; color: white; }
    .info-box {
      background: #dbeafe;
      border: 2px solid #3b82f6;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
    }
    .info-box-title {
      font-weight: 800;
      color: #1e40af;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .info-box-content {
      color: #1e3a8a;
    }
    .risk-legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }
    .risk-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .risk-badge {
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }
    .risk-badge-critical { background: #EF5350; color: white; }
    .risk-badge-high { background: #FFAB91; color: #BF360C; }
    .risk-badge-medium { background: #FFE082; color: #E65100; }
    .risk-badge-low { background: #FFF9C4; color: #F57F17; }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="container">
    <div style="padding: 20px 30px; background: #ffffff; border-bottom: 2px solid #CBD5E1;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 14px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">📑 Reports:</span>
        <button onclick="window.location.href='/'" style="padding: 10px 20px; background: #667eea; color: white; border: 2px solid #5a67d8; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          📋 Past Due Visits
        </button>
        <button onclick="window.location.href='/deviation'" style="padding: 10px 20px; background: #0ea5e9; color: white; border: 2px solid #0284c7; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          📊 Deviation Report
        </button>
        <button onclick="window.location.href='/eoe'" style="padding: 10px 20px; background: #10b981; color: white; border: 2px solid #059669; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          📋 EOE Report
        </button>
        <button onclick="window.location.href='/dx'" style="padding: 10px 20px; background: #8b5cf6; color: white; border: 2px solid #7c3aed; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          🩺 DX Report
        </button>
        <button onclick="window.location.href='/unbilled'" style="padding: 10px 20px; background: #f59e0b; color: white; border: 2px solid #d97706; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          💰 Unbilled
        </button>
      </div>
    </div>

    <div class="top-section">
      <div class="controls-panel">
        <header>
          <h1>📋 EOE Not Ready Dashboard</h1>
          <p class="subtitle">Track EOE Not Ready claims across locations • 📅 Auto-download: Daily at 2:00 PM IST (8:30 AM UTC)</p>
        </header>

        <div class="controls">
          <div class="control-group">
            <label>&nbsp;</label>
            <button class="btn-success" onclick="downloadEOEReport()" id="downloadBtn">
              ⬇️ Download Now
            </button>
          </div>
          <div class="control-group">
            <label>Status</label>
            <span id="status" class="status status-ok">Ready</span>
          </div>
        </div>
      </div>

      <div class="log-panel">
        <div class="log-viewer">
          <h3>📋 Activity Log</h3>
          <div id="logContent"></div>
        </div>
      </div>
    </div>

    <div class="charts-panel">
      <div id="chartsContainer" class="charts-grid">
        <div class="loading">Loading dashboard...</div>
      </div>
    </div>
  </div>

  <script>
    let detailedData = null;
    let charts = {};
    const socket = io();

    const allOffices = [
      'Nightingale - Taunton',
      'Aspire - Dublin',
      'Aspire - San Diego',
      'Aspire - Scottsdale',
      'Aspire - Yuba City',
      'Nightingale - Las Vegas',
      'Nightingale - Minnetonka',
      'Nightingale - Pompano Beach',
      'Nightingale - Willowbrook'
    ];

    socket.on('log', (log) => {
      addLogEntry(log);
    });

    socket.on('logs', (logs) => {
      logs.forEach(log => addLogEntry(log));
    });

    socket.on('eoe-complete', (result) => {
      loadData();
      if (result.success) {
        setStatus('ok', 'Download complete');
      } else {
        setStatus('error', 'Download failed');
      }
    });

    function addLogEntry(log) {
      const logContent = document.getElementById('logContent');
      const time = new Date(log.timestamp).toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry log-${log.type}`;
      entry.innerHTML = `<span class="log-time">[${time}]</span>${log.message}`;
      logContent.appendChild(entry);
      logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
    }

    loadData();

    async function loadData() {
      const container = document.getElementById('chartsContainer');
      container.innerHTML = '<div class="loading">Loading data...</div>';
      
      try {
        const response = await fetch('/api/eoe/detailed-analytics');
        detailedData = await response.json();
        
        renderCharts();
        setStatus('ok', 'Data loaded');
      } catch (error) {
        container.innerHTML = `<div class="error">Failed to load data: ${error.message}</div>`;
        setStatus('error', 'Load failed');
      }
    }

    function renderCharts() {
      const container = document.getElementById('chartsContainer');
      
      Object.values(charts).forEach(chart => chart.destroy());
      charts = {};
      
      if (!detailedData || Object.keys(detailedData.byOffice).length === 0) {
        container.innerHTML = '<div class="no-data">No EOE data available. Click "Download Now" to fetch data.</div>';
        return;
      }
      
      container.innerHTML = '';
      
      // 1. Root Cause by Office (Stacked Bar)
      createRootCauseByOfficeChart(container);
      
      // 2. Overall Root Cause Summary (Horizontal Bar)
      createOverallRootCauseSummaryChart(container);
      
      // 3. RAP Risk Distribution by Office (Stacked Column)
      createRiskDistributionChart(container);
      
      // 4. Office Comparison - Total EOE Not Ready (Grouped Bar)
      createOfficeComparisonChart(container);
      
      // 5. 7-Day Trend Line (All Offices)
      create7DayTrendChart(container);
      
      // Add Risk Classification Info Box before Risk Heatmap
      const infoBox = document.createElement('div');
      infoBox.className = 'info-box';
      infoBox.style.gridColumn = '1 / -1';
      infoBox.innerHTML = `
        <div class="info-box-title">📊 Risk Bucket Classification</div>
        <div class="info-box-content">
          EOE records are categorized by days pending based on the "Days Until RAP Cancellation" field:
          <div class="risk-legend">
            <div class="risk-item">
              <span class="risk-badge risk-badge-critical">Critical</span>
              <span>0-3 days (Immediate action required)</span>
            </div>
            <div class="risk-item">
              <span class="risk-badge risk-badge-high">High</span>
              <span>4-7 days (Urgent attention needed)</span>
            </div>
            <div class="risk-item">
              <span class="risk-badge risk-badge-medium">Medium</span>
              <span>8-14 days (Address soon)</span>
            </div>
            <div class="risk-item">
              <span class="risk-badge risk-badge-low">Low</span>
              <span>15+ days (Lower priority)</span>
            </div>
          </div>
        </div>
      `;
      container.appendChild(infoBox);
      
      // 6. Risk Heatmap
      createRiskHeatmap(container);
    }

    function createRootCauseByOfficeChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card full-width';
      card.innerHTML = `
        <div class="chart-title">Root Cause by Office</div>
        <div class="chart-container tall">
          <canvas id="rootCauseByOffice"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('rootCauseByOffice').getContext('2d');
      
      const rootCauseCategories = ['Missing Orders', 'Missing F2F', 'RAP Issues', 'PCR Tracking Missing', 'Service Date Mismatch', 'Medicare Missing'];
      const colors = ['#EF5350', '#FF7043', '#FFA726', '#FFCA28', '#66BB6A', '#42A5F5'];
      
      const datasets = rootCauseCategories.map((category, index) => ({
        label: category,
        data: allOffices.map(office => detailedData.byOffice[office]?.rootCauses[category] || 0),
        backgroundColor: colors[index],
        borderColor: colors[index],
        borderWidth: 1
      }));
      
      charts.rootCauseByOffice = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: allOffices,
          datasets: datasets
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12
            }
          },
          scales: {
            x: {
              stacked: true,
              beginAtZero: true,
              ticks: { precision: 0 }
            },
            y: {
              stacked: true
            }
          }
        }
      });
    }

    function createOverallRootCauseSummaryChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="chart-title">Overall Root Cause Summary</div>
        <div class="chart-container">
          <canvas id="overallRootCause"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('overallRootCause').getContext('2d');
      
      const rootCauseCategories = ['Missing Orders', 'Missing F2F', 'RAP Issues', 'PCR Tracking Missing', 'Service Date Mismatch', 'Medicare Missing'];
      const colors = ['#EF5350', '#FF7043', '#FFA726', '#FFCA28', '#66BB6A', '#42A5F5'];
      
      charts.overallRootCause = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: rootCauseCategories,
          datasets: [{
            label: 'Total Count',
            data: rootCauseCategories.map(cat => detailedData.rootCauses[cat] || 0),
            backgroundColor: colors,
            borderColor: colors,
            borderWidth: 1
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12
            }
          },
          scales: {
            x: {
              beginAtZero: true,
              ticks: { precision: 0 }
            }
          }
        }
      });
    }

    function createRiskDistributionChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card full-width';
      card.innerHTML = `
        <div class="chart-title">RAP Risk Distribution by Office</div>
        <div class="chart-container tall">
          <canvas id="riskDistribution"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('riskDistribution').getContext('2d');
      
      const riskBuckets = ['Critical', 'High', 'Medium', 'Low'];
      const riskColors = {
        'Critical': '#EF5350',
        'High': '#FF7043',
        'Medium': '#FFA726',
        'Low': '#66BB6A'
      };
      
      const datasets = riskBuckets.map(bucket => ({
        label: bucket + ' (0-3d, 4-7d, 8-14d, 15+d)',
        data: allOffices.map(office => detailedData.byOffice[office]?.riskBuckets[bucket] || 0),
        backgroundColor: riskColors[bucket],
        borderColor: riskColors[bucket],
        borderWidth: 1
      }));
      
      charts.riskDistribution = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: allOffices,
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12
            }
          },
          scales: {
            x: {
              stacked: true
            },
            y: {
              stacked: true,
              beginAtZero: true,
              ticks: { precision: 0 }
            }
          }
        }
      });
    }

    function createOfficeComparisonChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="chart-title">Office Comparison – Total EOE Not Ready</div>
        <div class="chart-container">
          <canvas id="officeComparison"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('officeComparison').getContext('2d');
      
      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, '#00ACC1');
      gradient.addColorStop(0.5, '#00BCD4');
      gradient.addColorStop(1, '#607D8B');
      
      charts.officeComparison = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: allOffices,
          datasets: [{
            label: 'Total EOE Not Ready',
            data: allOffices.map(office => detailedData.byOffice[office]?.total || 0),
            backgroundColor: gradient,
            borderColor: '#0097A7',
            borderWidth: 2,
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { precision: 0 }
            }
          }
        }
      });
    }

    function create7DayTrendChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card full-width';
      card.innerHTML = `
        <div class="chart-title">7-Day Trend Line (All Offices)</div>
        <div class="chart-container">
          <canvas id="trendLine"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('trendLine').getContext('2d');
      
      // Get all dates and sort them
      const allDates = Object.keys(detailedData.byDate).sort();
      const last7Dates = allDates.slice(-7);
      
      const officeColors = [
        '#EF5350', '#FF7043', '#FFA726', '#FFCA28', '#66BB6A', 
        '#42A5F5', '#AB47BC', '#26C6DA', '#EC407A'
      ];
      
      const datasets = allOffices.map((office, index) => ({
        label: office,
        data: last7Dates.map(date => detailedData.byDate[date]?.[office] || 0),
        borderColor: officeColors[index],
        backgroundColor: officeColors[index] + '33',
        borderWidth: 2,
        tension: 0.3,
        fill: false
      }));
      
      charts.trendLine = new Chart(ctx, {
        type: 'line',
        data: {
          labels: last7Dates,
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { 
              position: 'top',
              labels: { boxWidth: 12, padding: 10 }
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { precision: 0 }
            }
          }
        }
      });
    }

    function createRiskHeatmap(container) {
      const card = document.createElement('div');
      card.className = 'chart-card full-width';
      card.innerHTML = `
        <div class="chart-title">Risk Heatmap</div>
        <div class="heatmap-container">
          <table class="heatmap-table" id="heatmapTable"></table>
        </div>
      `;
      container.appendChild(card);
      
      const table = document.getElementById('heatmapTable');
      const riskBuckets = ['Critical (0-3d)', 'High (4-7d)', 'Medium (8-14d)', 'Low (15+d)'];
      
      // Create header
      let headerHTML = '<thead><tr><th>Office</th>';
      riskBuckets.forEach(bucket => {
        headerHTML += `<th>${bucket}</th>`;
      });
      headerHTML += '</tr></thead>';
      
      // Create body
      let bodyHTML = '<tbody>';
      allOffices.forEach(office => {
        bodyHTML += `<tr><td style="text-align: left; font-weight: 700;">${office}</td>`;
        
        const critical = detailedData.byOffice[office]?.riskBuckets['Critical'] || 0;
        const high = detailedData.byOffice[office]?.riskBuckets['High'] || 0;
        const medium = detailedData.byOffice[office]?.riskBuckets['Medium'] || 0;
        const low = detailedData.byOffice[office]?.riskBuckets['Low'] || 0;
        
        bodyHTML += `<td class="${getHeatmapClass(critical, 'critical')}">${critical}</td>`;
        bodyHTML += `<td class="${getHeatmapClass(high, 'high')}">${high}</td>`;
        bodyHTML += `<td class="${getHeatmapClass(medium, 'medium')}">${medium}</td>`;
        bodyHTML += `<td class="${getHeatmapClass(low, 'low')}">${low}</td>`;
        bodyHTML += '</tr>';
      });
      bodyHTML += '</tbody>';
      
      table.innerHTML = headerHTML + bodyHTML;
    }

    function getHeatmapClass(value, type) {
      if (value === 0) return 'heatmap-cell-0';
      if (type === 'critical') return 'heatmap-cell-critical';
      if (type === 'high') return 'heatmap-cell-high';
      if (type === 'medium') return 'heatmap-cell-medium';
      return 'heatmap-cell-low';
    }

    async function downloadEOEReport() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Downloading...';
      setStatus('ok', 'Downloading...');
      
      try {
        const response = await fetch('/api/eoe/download', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          setStatus('ok', 'Complete!');
        } else {
          throw new Error(result.error || 'Download failed');
        }
      } catch (error) {
        setStatus('error', 'Failed');
        addLogEntry({ type: 'error', message: `Error: ${error.message}`, timestamp: new Date().toISOString() });
      } finally {
        btn.disabled = false;
        btn.textContent = '⬇️ Download Now';
      }
    }

    function setStatus(type, message) {
      const status = document.getElementById('status');
      status.className = `status status-${type}`;
      status.textContent = message;
    }
  </script>
</body>
</html>
