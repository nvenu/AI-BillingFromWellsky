<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deviation Report - Kinnser Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📊</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 50%, #3b82f6 100%);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #ffffff;
    }
    .header {
      padding: 30px;
      background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
      border-bottom: 4px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(90deg, #8b5cf6, #6366f1, #3b82f6) border-box;
    }
    h1 { 
      font-size: 26px; 
      font-weight: 900; 
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 50%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
    }
    .subtitle { 
      font-size: 13px; 
      color: #6b7280; 
      font-weight: 600;
      margin-bottom: 15px;
    }
    .back-btn {
      display: inline-block;
      padding: 8px 16px;
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(107, 114, 128, 0.3);
    }
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(107, 114, 128, 0.4);
    }
    .content {
      padding: 30px;
      background: linear-gradient(135deg, #f8f9ff 0%, #e8eeff 100%);
      flex: 1;
    }
    .placeholder {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.15);
      border: 2px solid rgba(139, 92, 246, 0.1);
    }
    .placeholder h2 {
      font-size: 24px;
      color: #8b5cf6;
      margin-bottom: 10px;
    }
    .placeholder p {
      font-size: 16px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Reports Navigation Section -->
    <div style="padding: 20px 30px; background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%); border-bottom: 3px solid transparent; background: linear-gradient(white, white) padding-box, linear-gradient(90deg, #8b5cf6, #6366f1, #3b82f6) border-box;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 14px; font-weight: 800; color: #4b5563; text-transform: uppercase; letter-spacing: 1px;">📑 Reports:</span>
        <button onclick="window.location.href='/'" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); transition: all 0.2s;">
          📋 Past Due Visits
        </button>
        <button onclick="window.location.href='/deviation'" style="padding: 10px 20px; background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); transition: all 0.2s;">
          📊 Deviation Report
        </button>
      </div>
    </div>

    <div class="header">
      <h1>📊 Deviation Report Dashboard</h1>
      <p class="subtitle">Track and analyze deviations across locations</p>
    </div>

    <div class="content">
      <div class="placeholder">
        <h2>🚧 Coming Soon</h2>
        <p>Deviation report features will be implemented here.</p>
      </div>
    </div>
  </div>
</body>
</html>
