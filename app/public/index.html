<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinnser Past Due Report Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏥</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      overflow: hidden;
    }
    .container {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      gap: 0;
      background: #ffffff;
    }
    .top-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 3px solid #667eea;
    }
    .controls-panel {
      padding: 30px;
      background: #ffffff;
      overflow-y: auto;
      max-height: 40vh;
    }
    .log-panel {
      padding: 30px;
      background: #1a1a2e;
      border-left: 3px solid #667eea;
      overflow-y: auto;
      max-height: 40vh;
    }
    .charts-panel {
      padding: 30px;
      background: #ffffff;
      overflow-y: auto;
    }
    header {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px solid #667eea;
    }
    h1 { 
      font-size: 24px; 
      font-weight: 800; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }
    .subtitle { 
      font-size: 13px; 
      color: #6b7280; 
      font-weight: 500;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 20px;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.07);
      border: 1px solid #e5e7eb;
    }
    .control-group { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }
    label { 
      font-size: 12px; 
      font-weight: 700; 
      color: #374151; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, input[type="date"] {
      padding: 10px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      background: white;
      transition: all 0.2s;
    }
    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 6px rgba(102, 126, 234, 0.3);
    }
    button:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled { 
      background: #d1d5db; 
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-success { 
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);
    }
    .btn-success:hover { 
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.4);
    }
    .status {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-block;
    }
    .status-ok { 
      background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
      color: #065f46;
      border: 2px solid #3b82f6;
    }
    .status-error { 
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
      color: #991b1b;
      border: 2px solid #f97316;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
    }
    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.07);
      border: 1px solid #e5e7eb;
      transition: all 0.3s;
    }
    .chart-card:hover {
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .chart-title {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e5e7eb;
    }
    .chart-container { 
      position: relative; 
      height: 280px; 
    }
    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 2px solid #e5e7eb;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
    }
    .stats span {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .loading, .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
      background: white;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      border: 2px dashed #e5e7eb;
    }
    .log-viewer {
      color: #e5e7eb;
      font-family: 'SF Mono', 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .log-viewer h3 {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 2px solid #667eea;
    }
    .log-entry {
      padding: 8px 12px;
      margin-bottom: 4px;
      border-radius: 6px;
      background: rgba(255,255,255,0.03);
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }
    .log-entry:hover {
      background: rgba(255,255,255,0.06);
    }
    .log-entry:last-child { margin-bottom: 0; }
    .log-time { 
      color: #9ca3af; 
      margin-right: 10px; 
      font-size: 11px;
      font-weight: 600;
    }
    .log-info { 
      color: #60a5fa;
      border-left-color: #60a5fa;
    }
    .log-success { 
      color: #34d399;
      border-left-color: #34d399;
    }
    .log-error { 
      color: #f87171;
      border-left-color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="container">
    <div class="top-section">
      <div class="controls-panel">
        <header>
          <h1>🏥 Kinnser Past Due Report Dashboard</h1>
          <p class="subtitle">Automated report tracking and analytics</p>
        </header>

        <div class="controls">
          <div class="control-group">
            <label>Report Type</label>
            <select id="reportFilter">
              <option value="all">All Reports</option>
            </select>
          </div>
          <div class="control-group">
            <label>Start Date</label>
            <input type="date" id="startDate">
          </div>
          <div class="control-group">
            <label>End Date</label>
            <input type="date" id="endDate">
          </div>
          <div class="control-group">
            <label>&nbsp;</label>
            <button onclick="loadData()">🔄 Refresh</button>
          </div>
          <div class="control-group">
            <label>&nbsp;</label>
            <button class="btn-success" onclick="downloadReports()" id="downloadBtn">
              ⬇️ Download Now
            </button>
          </div>
          <div class="control-group">
            <label>Status</label>
            <span id="status" class="status status-ok">Ready</span>
          </div>
        </div>
      </div>

      <div class="log-panel">
        <div class="log-viewer">
          <h3>📋 Activity Log</h3>
          <div id="logContent"></div>
        </div>
      </div>
    </div>

    <div class="charts-panel">
      <div id="chartsContainer" class="charts-grid">
        <div class="loading">Loading dashboard...</div>
      </div>
    </div>
  </div>

  <script>
    let analyticsData = {};
    let charts = {};
    const socket = io();

    socket.on('log', (log) => {
      addLogEntry(log);
    });

    socket.on('logs', (logs) => {
      logs.forEach(log => addLogEntry(log));
    });

    function addLogEntry(log) {
      const logContent = document.getElementById('logContent');
      const time = new Date(log.timestamp).toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry log-${log.type}`;
      entry.innerHTML = `<span class="log-time">[${time}]</span>${log.message}`;
      logContent.appendChild(entry);
      logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
    }

    function clearLogs() {
      document.getElementById('logContent').innerHTML = '';
    }

    const today = new Date();
    const thirtyDaysAgo = new Date(today);
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
    document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];

    loadData();

    async function loadData() {
      const container = document.getElementById('chartsContainer');
      container.innerHTML = '<div class="loading">Loading data...</div>';
      
      try {
        const response = await fetch('/api/analytics');
        analyticsData = await response.json();
        
        const filter = document.getElementById('reportFilter');
        const currentValue = filter.value;
        filter.innerHTML = '<option value="all">All Reports</option>';
        Object.keys(analyticsData).forEach(name => {
          filter.innerHTML += `<option value="${name}">${name}</option>`;
        });
        filter.value = currentValue || 'all';
        
        renderCharts();
        setStatus('ok', 'Data loaded');
      } catch (error) {
        container.innerHTML = `<div class="error">Failed to load data: ${error.message}</div>`;
        setStatus('error', 'Load failed');
      }
    }

    function renderCharts() {
      const container = document.getElementById('chartsContainer');
      const filterValue = document.getElementById('reportFilter').value;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      
      Object.values(charts).forEach(chart => chart.destroy());
      charts = {};
      
      let reportsToShow = filterValue === 'all' 
        ? Object.entries(analyticsData)
        : [[filterValue, analyticsData[filterValue] || []]];
      
      if (reportsToShow.length === 0 || (reportsToShow.length === 1 && !reportsToShow[0][1])) {
        container.innerHTML = '<div class="no-data">No reports available. Click "Download Now" to fetch data.</div>';
        return;
      }
      
      container.innerHTML = '';
      
      reportsToShow.forEach(([reportName, data], index) => {
        if (!data || data.length === 0) return;
        
        const filteredData = data.filter(d => {
          if (startDate && d.date < startDate) return false;
          if (endDate && d.date > endDate) return false;
          return true;
        });
        
        if (filteredData.length === 0) return;
        
        const cardId = `chart-${index}`;
        const card = document.createElement('div');
        card.className = 'chart-card';
        
        const totalBillable = filteredData.reduce((sum, d) => sum + (d.billableCount || 0), 0);
        const totalNonBillable = filteredData.reduce((sum, d) => sum + (d.nonBillableCount || 0), 0);
        const totalRecords = filteredData.reduce((sum, d) => sum + d.rowCount, 0);
        
        card.innerHTML = `
          <div class="chart-title">${reportName}</div>
          <div class="chart-container">
            <canvas id="${cardId}"></canvas>
          </div>
          <div class="stats">
            <span>Total: ${totalRecords}</span>
            <span style="color: #3b82f6;">✓ Billable: ${totalBillable}</span>
            <span style="color: #f97316;">✗ Non-Billable: ${totalNonBillable}</span>
          </div>
        `;
        
        container.appendChild(card);
        
        const ctx = document.getElementById(cardId).getContext('2d');
        
        // All charts are stacked bar charts showing billable vs non-billable
        charts[cardId] = new Chart(ctx, {
          type: 'bar',
          indexAxis: 'y',
          data: {
            labels: filteredData.map(d => d.date),
            datasets: [
              {
                label: 'Billable',
                data: filteredData.map(d => d.billableCount || 0),
                backgroundColor: '#3b82f6',
                borderColor: '#2563eb',
                borderWidth: 2
              },
              {
                label: 'Non-Billable',
                data: filteredData.map(d => d.nonBillableCount || 0),
                backgroundColor: '#f97316',
                borderColor: '#ea580c',
                borderWidth: 2
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
              legend: { 
                display: true, 
                position: 'top',
                labels: {
                  font: { size: 12, weight: 'bold' }
                }
              },
              tooltip: {
                callbacks: {
                  footer: function(tooltipItems) {
                    let total = 0;
                    tooltipItems.forEach(item => {
                      total += item.parsed.y;
                    });
                    return 'Total: ' + total;
                  }
                }
              }
            },
            scales: { 
              x: { 
                grid: { display: false }
              },
              y: { 
                beginAtZero: true,
                ticks: { precision: 0 }
              }
            }
          }
        });
      });
      
      if (container.innerHTML === '') {
        container.innerHTML = '<div class="no-data">No data for selected filters</div>';
      }
    }

    async function downloadReports() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Downloading...';
      setStatus('ok', 'Downloading...');
      
      clearLogs();
      
      try {
        const response = await fetch('/api/download', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          setStatus('ok', 'Complete!');
          setTimeout(() => loadData(), 2000);
        } else {
          throw new Error(result.error || 'Download failed');
        }
      } catch (error) {
        setStatus('error', 'Failed');
        addLogEntry({ type: 'error', message: `Error: ${error.message}`, timestamp: new Date().toISOString() });
      } finally {
        btn.disabled = false;
        btn.textContent = '⬇️ Download Now';
      }
    }

    function setStatus(type, message) {
      const status = document.getElementById('status');
      status.className = `status status-${type}`;
      status.textContent = message;
    }

    document.getElementById('reportFilter').addEventListener('change', renderCharts);
    document.getElementById('startDate').addEventListener('change', renderCharts);
    document.getElementById('endDate').addEventListener('change', renderCharts);
  </script>
</body>
</html>
