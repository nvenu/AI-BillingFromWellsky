<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Managed Care Unbilled Report - Kinnser</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #F1F5F9;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #F1F5F9;
    }
    .top-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 2px solid #CBD5E1;
      background: #ffffff;
      flex-shrink: 0;
    }
    .controls-panel {
      padding: 30px;
      background: #ffffff;
      border-right: 1px solid #E2E8F0;
      overflow-y: auto;
      max-height: 50vh;
    }
    .log-panel {
      padding: 30px;
      background: #263238;
      overflow-y: auto;
      max-height: 50vh;
    }
    .charts-panel {
      padding: 30px;
      background: #F1F5F9;
      flex: 1;
    }
    header {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #CBD5E1;
    }
    h1 { 
      font-size: 26px; 
      font-weight: 900; 
      color: #1e293b;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
    }
    .subtitle { 
      font-size: 13px; 
      color: #64748b; 
      font-weight: 600;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 20px;
      background: #ffffff;
      border-radius: 12px;
      border: 2px solid #CBD5E1;
    }
    .control-group { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }
    label { 
      font-size: 11px; 
      font-weight: 800; 
      color: #64748b; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    button {
      padding: 12px 16px;
      border: 2px solid #CBD5E1;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
      color: #1e293b;
    }
    button:hover {
      background: #E2E8F0;
      border-color: #94a3b8;
      transform: translateY(-1px);
    }
    .btn-success {
      background: #f59e0b;
      color: white;
      border-color: #d97706;
    }
    .btn-success:hover {
      background: #d97706;
      border-color: #b45309;
    }
    .status {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }
    .status-ok {
      background: #d1fae5;
      color: #065f46;
      border: 2px solid #10b981;
    }
    .status-error {
      background: #fee2e2;
      color: #991b1b;
      border: 2px solid #ef4444;
    }
    .kpi-section {
      margin-bottom: 25px;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .kpi-card {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border-radius: 12px;
      padding: 25px;
      color: white;
      text-align: center;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
      transition: transform 0.2s;
    }
    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
    }
    .kpi-value { 
      font-size: 36px; 
      font-weight: 900; 
      margin-bottom: 8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .kpi-label { 
      font-size: 13px; 
      font-weight: 700;
      opacity: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 25px;
    }
    .chart-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 25px;
      border: 2px solid #CBD5E1;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .chart-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      border-color: #94a3b8;
      background: #E2E8F0;
    }
    .chart-card.full-width {
      grid-column: 1 / -1;
    }
    .chart-title {
      font-size: 18px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid #CBD5E1;
      letter-spacing: -0.3px;
    }
    .chart-container { 
      position: relative; 
      height: 400px; 
    }
    .chart-container.tall { 
      height: 500px; 
    }
    .loading, .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
      background: #ffffff;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: 2px dashed #CBD5E1;
    }
    .log-viewer {
      color: #ECEFF1;
      font-family: 'SF Mono', 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .log-viewer h3 {
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #475569;
      letter-spacing: 0.5px;
    }
    .log-entry {
      padding: 10px 14px;
      margin-bottom: 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border-left: 4px solid transparent;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .log-entry:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(4px);
    }
    .log-time { 
      color: #B0BEC5; 
      margin-right: 10px; 
      font-size: 11px;
      font-weight: 700;
    }
    .log-info { 
      color: #4DD0E1;
      border-left-color: #4DD0E1;
    }
    .log-success { 
      color: #81C784;
      border-left-color: #81C784;
    }
    .log-error { 
      color: #E57373;
      border-left-color: #E57373;
      background: rgba(229, 115, 115, 0.1);
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="container">
    <div style="padding: 20px 30px; background: #ffffff; border-bottom: 2px solid #CBD5E1;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 14px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">📑 Reports:</span>
        <button onclick="window.location.href='/'" style="padding: 10px 20px; background: #667eea; color: white; border: 2px solid #5a67d8; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          📋 Past Due Visits
        </button>
        <button onclick="window.location.href='/deviation'" style="padding: 10px 20px; background: #0ea5e9; color: white; border: 2px solid #0284c7; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          📊 Deviation Report
        </button>
        <button onclick="window.location.href='/eoe'" style="padding: 10px 20px; background: #10b981; color: white; border: 2px solid #059669; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          📋 EOE Report
        </button>
        <button onclick="window.location.href='/dx'" style="padding: 10px 20px; background: #8b5cf6; color: white; border: 2px solid #7c3aed; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          🩺 DX Report
        </button>
        <button onclick="window.location.href='/unbilled'" style="padding: 10px 20px; background: #f59e0b; color: white; border: 2px solid #d97706; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">
          💰 Unbilled
        </button>
      </div>
    </div>

    <div class="top-section">
      <div class="controls-panel">
        <header>
          <h1>💰 Managed Care Unbilled Dashboard</h1>
          <p class="subtitle">Track unbilled managed care claims • 📅 Auto-download: Daily at 3:30 PM IST (10:00 AM UTC)</p>
        </header>

        <div class="controls">
          <div class="control-group">
            <label>&nbsp;</label>
            <button class="btn-success" onclick="downloadUnbilledReport()" id="downloadBtn">
              ⬇️ Download Now
            </button>
          </div>
          <div class="control-group">
            <label>Status</label>
            <span id="status" class="status status-ok">Ready</span>
          </div>
        </div>
      </div>

      <div class="log-panel">
        <div class="log-viewer">
          <h3>📋 Activity Log</h3>
          <div id="logContent"></div>
        </div>
      </div>
    </div>

    <div class="charts-panel">
      <div class="kpi-section">
        <div class="kpi-grid" id="kpiGrid">
          <div class="loading">Loading KPIs...</div>
        </div>
      </div>

      <div id="chartsContainer" class="charts-grid">
        <div class="loading">Loading dashboard...</div>
      </div>
    </div>
  </div>

  <script>
    let analyticsData = null;
    let charts = {};
    const socket = io();

    const allOffices = [
      'Nightingale - Taunton',
      'Aspire - Dublin',
      'Aspire - San Diego',
      'Aspire - Scottsdale',
      'Aspire - Yuba City',
      'Nightingale - Las Vegas',
      'Nightingale - Minnetonka',
      'Nightingale - Pompano Beach',
      'Nightingale - Willowbrook'
    ];

    socket.on('log', (log) => {
      addLogEntry(log);
    });

    socket.on('logs', (logs) => {
      logs.forEach(log => addLogEntry(log));
    });

    socket.on('unbilled-complete', (result) => {
      loadData();
      if (result.success) {
        setStatus('ok', 'Download complete');
      } else {
        setStatus('error', 'Download failed');
      }
    });

    function addLogEntry(log) {
      const logContent = document.getElementById('logContent');
      const time = new Date(log.timestamp).toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry log-${log.type}`;
      entry.innerHTML = `<span class="log-time">[${time}]</span>${log.message}`;
      logContent.appendChild(entry);
      logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
    }

    loadData();

    async function loadData() {
      const container = document.getElementById('chartsContainer');
      const kpiGrid = document.getElementById('kpiGrid');
      container.innerHTML = '<div class="loading">Loading data...</div>';
      kpiGrid.innerHTML = '<div class="loading">Loading KPIs...</div>';
      
      try {
        const response = await fetch('/api/unbilled/analytics');
        analyticsData = await response.json();
        
        console.log('Analytics data:', analyticsData);
        
        renderKPIs();
        renderCharts();
        setStatus('ok', 'Data loaded');
      } catch (error) {
        container.innerHTML = `<div class="error">Failed to load data: ${error.message}</div>`;
        setStatus('error', 'Load failed');
      }
    }

    function renderKPIs() {
      const kpiGrid = document.getElementById('kpiGrid');
      
      if (!analyticsData || analyticsData.totalUnbilled === 0) {
        kpiGrid.innerHTML = '<div class="no-data">No unbilled data available. Click "Download Now" to fetch data.</div>';
        return;
      }
      
      kpiGrid.innerHTML = `
        <div class="kpi-card">
          <div class="kpi-value">$${analyticsData.totalUnbilled.toLocaleString()}</div>
          <div class="kpi-label">Total Unbilled</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">$${analyticsData.totalCharges.toLocaleString()}</div>
          <div class="kpi-label">Total Charges</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${analyticsData.totalVisits.toLocaleString()}</div>
          <div class="kpi-label">Total Visits</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${Object.keys(analyticsData.byPayerType || {}).length}</div>
          <div class="kpi-label">Payer Types</div>
        </div>
      `;
    }

    function renderCharts() {
      const container = document.getElementById('chartsContainer');
      
      Object.values(charts).forEach(chart => chart.destroy());
      charts = {};
      
      if (!analyticsData || analyticsData.totalUnbilled === 0) {
        container.innerHTML = '<div class="no-data">No unbilled data available. Click "Download Now" to fetch data.</div>';
        return;
      }
      
      container.innerHTML = '';
      
      // 1. By Office - Total Unbilled
      createByOfficeChart(container);
      
      // 2. Trend Line - Total Unbilled Over Time
      createTrendChart(container);
      
      // 3. By Payer Type
      createPayerTypeChart(container);
      
      // 4. Aging Summary
      createAgingSummaryChart(container);
      
      // 5. Visits by Office
      createVisitsByOfficeChart(container);
    }

    function createByOfficeChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card full-width';
      card.innerHTML = `
        <div class="chart-title">Total Unbilled by Office</div>
        <div class="chart-container tall">
          <canvas id="byOfficeChart"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('byOfficeChart').getContext('2d');
      
      const officeData = allOffices.map(office => 
        analyticsData.byOffice[office]?.totalUnbilled || 0
      );
      
      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, '#f59e0b');
      gradient.addColorStop(1, '#d97706');
      
      charts.byOffice = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: allOffices,
          datasets: [{
            label: 'Total Unbilled ($)',
            data: officeData,
            backgroundColor: gradient,
            borderColor: '#d97706',
            borderWidth: 2,
            borderRadius: 8
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12,
              callbacks: {
                label: function(context) {
                  return `$${context.parsed.x.toLocaleString()}`;
                }
              }
            }
          },
          scales: {
            x: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return '$' + value.toLocaleString();
                }
              }
            }
          }
        }
      });
    }

    function createTrendChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card full-width';
      card.innerHTML = `
        <div class="chart-title">Total Unbilled Trend (All Offices)</div>
        <div class="chart-container">
          <canvas id="trendChart"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('trendChart').getContext('2d');
      
      const dates = Object.keys(analyticsData.byDate || {}).sort();
      const unbilledData = dates.map(date => analyticsData.byDate[date].totalUnbilled);
      
      charts.trend = new Chart(ctx, {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: 'Total Unbilled ($)',
            data: unbilledData,
            borderColor: '#f59e0b',
            backgroundColor: 'rgba(245, 158, 11, 0.1)',
            borderWidth: 3,
            tension: 0.3,
            fill: true,
            pointRadius: 5,
            pointHoverRadius: 7
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12,
              callbacks: {
                label: function(context) {
                  return `$${context.parsed.y.toLocaleString()}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return '$' + value.toLocaleString();
                }
              }
            }
          }
        }
      });
    }

    function createPayerTypeChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="chart-title">Unbilled by Payer Type</div>
        <div class="chart-container">
          <canvas id="payerTypeChart"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('payerTypeChart').getContext('2d');
      
      const payerTypes = Object.keys(analyticsData.byPayerType || {});
      const amounts = Object.values(analyticsData.byPayerType || {});
      
      const colors = payerTypes.map((_, index) => {
        const hue = (index * 360 / payerTypes.length);
        return `hsl(${hue}, 70%, 60%)`;
      });
      
      charts.payerType = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: payerTypes,
          datasets: [{
            label: 'Unbilled Amount ($)',
            data: amounts,
            backgroundColor: colors,
            borderColor: colors.map(c => c.replace('60%', '50%')),
            borderWidth: 2,
            borderRadius: 8
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12,
              callbacks: {
                label: function(context) {
                  return `$${parseFloat(context.parsed.x).toLocaleString()}`;
                }
              }
            }
          },
          scales: {
            x: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return '$' + value.toLocaleString();
                }
              }
            }
          }
        }
      });
    }

    function createAgingSummaryChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="chart-title">Aging Summary</div>
        <div class="chart-container">
          <canvas id="agingChart"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('agingChart').getContext('2d');
      
      const agingBuckets = ['0-30', '31-60', '61-90', '91-120', '121-150', '151-180', '181-210', '211-240', '241+'];
      const amounts = agingBuckets.map(bucket => parseFloat(analyticsData.agingSummary[bucket] || 0));
      
      const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#f97316', '#dc2626', '#7f1d1d'];
      
      charts.aging = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: agingBuckets.map(b => b + ' days'),
          datasets: [{
            data: amounts,
            backgroundColor: colors,
            borderColor: '#ffffff',
            borderWidth: 3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { 
              position: 'right',
              labels: { boxWidth: 15, padding: 10 }
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12,
              callbacks: {
                label: function(context) {
                  const value = parseFloat(context.parsed);
                  return `${context.label}: $${value.toLocaleString()}`;
                }
              }
            }
          }
        }
      });
    }

    function createVisitsByOfficeChart(container) {
      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="chart-title">Total Visits by Office</div>
        <div class="chart-container">
          <canvas id="visitsChart"></canvas>
        </div>
      `;
      container.appendChild(card);
      
      const ctx = document.getElementById('visitsChart').getContext('2d');
      
      const visitsData = allOffices.map(office => 
        analyticsData.byOffice[office]?.totalVisits || 0
      );
      
      charts.visits = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: allOffices,
          datasets: [{
            label: 'Total Visits',
            data: visitsData,
            backgroundColor: '#f59e0b',
            borderColor: '#d97706',
            borderWidth: 2,
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { precision: 0 }
            }
          }
        }
      });
    }

    async function downloadUnbilledReport() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Downloading...';
      setStatus('ok', 'Downloading...');
      
      try {
        const response = await fetch('/api/unbilled/download', { method: 'POST' });
        const result = await response.json();
        
        if (result.success) {
          setStatus('ok', 'Complete!');
        } else {
          throw new Error(result.error || 'Download failed');
        }
      } catch (error) {
        setStatus('error', 'Failed');
        addLogEntry({ type: 'error', message: `Error: ${error.message}`, timestamp: new Date().toISOString() });
      } finally {
        btn.disabled = false;
        btn.textContent = '⬇️ Download Now';
      }
    }

    function setStatus(type, message) {
      const status = document.getElementById('status');
      status.className = `status status-${type}`;
      status.textContent = message;
    }
  </script>
</body>
</html>
