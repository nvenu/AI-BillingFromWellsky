<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLT Healthcare - Billing Automation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏥</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 90%;
    }
    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }
    .logos img {
      height: 60px;
      width: auto;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 40px;
      font-weight: 500;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
    }
    .btn:active {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logos">
      <img src="/SOLT-LOGO-WITHOUT-TEXT.svg" alt="SOLT Healthcare">
      <img src="/WS_HomeHealthHospice_Stacked.svg" alt="WellSky">
    </div>
    <h1>SOLT Healthcare</h1>
    <p class="subtitle">Kinnser Billing Automation System</p>
    <a href="/billing" class="btn">Open Billing Automation</a>
  </div>
</body>
</html>
